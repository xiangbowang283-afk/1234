.modal-btn-primary{background:var(--primary);color:#fff}
.modal-btn-primary:hover{background:var(--primary-dark)}
.modal-btn-ghost{background:var(--card-bg);color:var(--text-mid);border:1.5px solid var(--border)}
.modal-btn-ghost:hover{border-color:var(--primary);color:var(--primary)}

<div class="app" id="app"></div>

<script>
const AVATAR_COLORS=[['#FF6B35','#fff'],['#4A90D9','#fff'],['#7B68EE','#fff'],['#2ECC71','#fff'],['#E74C3C','#fff'],['#F39C12','#fff'],['#1ABC9C','#fff']];
function getAvatarColor(id){const i=(id||'').charCodeAt(0)%AVATAR_COLORS.length;return AVATAR_COLORS[i];}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = event => {
    const img = new Image();
    img.src = event.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 800;
      const MAX_HEIGHT = 800;
      let width = img.width;
      let height = img.height;
      if (width > height) {
        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
      } else {
        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
  };
}

const DEMO_USERS=[
  {id:'demo',displayName:'示範用戶',password:'1234',avatar:null,bio:'喜歡分享家中毛孩的點點滴滴🐾'},
  {id:'catmom99',displayName:'貓咪媽媽',password:'1234',avatar:null,bio:'家有三貓，天天都是貓奴生活🐈'},
];
const DEMO_POSTS=[
  {id:'p1',authorId:'catmom99',authorName:'貓咪媽媽',authorAvatar:null,title:'我家橘貓的一天 🍊',content:'每天早上五點準時被踩臉叫醒，肚子餓了就來找我，吃飽之後就倒下睡覺。這就是橘貓的生活！大家的貓咪也是這樣嗎？',image:null,time:Date.now()-3600000*2,likes:12,likedBy:[],comments:[{id:'c1',authorId:'demo',authorName:'示範用戶',authorAvatar:null,text:'哈哈我家的也是！橘貓都一樣 XD'}]},
  {id:'p2',authorId:'demo',authorName:'示範用戶',authorAvatar:null,title:'柴犬第一次去海邊 🏖️',content:'今天帶柴柴去海邊，牠一看到海浪就嚇跑了！還是沙灘比較適合牠，挖沙挖得超開心的。分享給大家一些小技巧：第一次帶狗去海邊，建議先在沙灘上活動，讓狗狗習慣環境，不要強迫牠靠近水。',image:null,time:Date.now()-3600000*5,likes:27,likedBy:[],comments:[{id:'c2',authorId:'catmom99',authorName:'貓咪媽媽',authorAvatar:null,text:'好可愛！下次帶我家貓去試試哈哈（才不要）'}]},
  {id:'p3',authorId:'catmom99',authorName:'貓咪媽媽',authorAvatar:null,title:'新手養兔子的注意事項 🐰',content:'最近收養了一隻垂耳兔，才知道原來兔子需要這麼多照顧！牠們不能吃太多水果，需要大量的牧草，還要定期打預防針。分享給想養兔子的朋友們參考！',image:null,time:Date.now()-3600000*24,likes:8,likedBy:[],comments:[]},
];

const CAPTCHA_IMAGES = [
  { url: '1.jpg', isTarget: false },
  { url: '2.jpg', isTarget: true },
  { url: '3.jpg', isTarget: false },
  { url: '4.jpg', isTarget: false },
  { url: '5.jpg', isTarget: false },
  { url: '6.jpg', isTarget: true },
  { url: '7.jpg', isTarget: true },
  { url: '8.jpg', isTarget: false },
  { url: '9.jpg', isTarget: false },
];
// 註：您可以修改上方的 isTarget 為 true/false，來設定哪些圖片是正確答案（朴寶英）

let savedUsers = localStorage.getItem('pawshare_users');
let savedPosts = localStorage.getItem('pawshare_posts');
let savedUser = localStorage.getItem('pawshare_current_user');

let parsedUsers = savedUsers ? JSON.parse(savedUsers) : [...DEMO_USERS];
parsedUsers = parsedUsers.map(u => {
  if (u.id === 'demo' && !u.bio) u.bio = '喜歡分享家中毛孩的點點滴滴🐾';
  if (u.id === 'catmom99' && !u.bio) u.bio = '家有三貓，天天都是貓奴生活🐈';
  return u;
});

let state={
  users: parsedUsers,
  posts: savedPosts ? JSON.parse(savedPosts) : [...DEMO_POSTS],
  currentUser: savedUser ? JSON.parse(savedUser) : null,
  view: savedUser ? 'home' : 'feed',
  toast:null,
  modal:false,
  expandedComments:{},
  commentInputs:{},
  captchaOpen:false,
  pendingUser:null,
  captchaSelection:[],
  profileUserId:null,
  editingPostId:null,
};

let loginForm={id:'',pw:'',err:''};
let regForm={id:'',name:'',pw:'',avatar:null,avatarSrc:null,err:''};
let newPostForm={title:'',content:'',image:null,imgSrc:null};
let editProfileForm={name:'',bio:'',avatarSrc:null};

function setState(patch){
  Object.assign(state,patch);
  try {
    if('users' in patch) localStorage.setItem('pawshare_users', JSON.stringify(state.users));
    if('posts' in patch) localStorage.setItem('pawshare_posts', JSON.stringify(state.posts));
    if('currentUser' in patch) {
      if(state.currentUser) localStorage.setItem('pawshare_current_user', JSON.stringify(state.currentUser));
      else localStorage.removeItem('pawshare_current_user');
    }
  } catch(e) {
    if(e.name==='QuotaExceededError') alert('儲存空間已滿！過去的上傳圖檔佔用了太多空間，已啟用圖片壓縮機制，未來發文將不受影響。如果您一直無法發文，可以嘗試清除快取。');
  }
  render();
}
function formatTime(ts){
  const diff=Date.now()-ts;
  if(diff<60000)return '剛剛';
  if(diff<3600000)return Math.floor(diff/60000)+'分鐘前';
  if(diff<86400000)return Math.floor(diff/3600000)+'小時前';
  return Math.floor(diff/86400000)+'天前';
}
function avatarEl(user,cls=''){
  const [bg,fg]=getAvatarColor(user?user.id:'?');
  const letter=(user?(user.displayName||user.id):'?')[0].toUpperCase();
  if(user&&user.avatar){
    return `<img src="${user.avatar}" class="avatar-circle ${cls}" style="object-fit:cover">`;
  }
  return `<div class="avatar-circle ${cls}" style="background:${bg};color:${fg}">${letter}</div>`;
}
function findUser(id){return state.users.find(u=>u.id===id);}

function showToast(msg){
  setState({toast:msg});
  setTimeout(()=>setState({toast:null}),2500);
}

function handleLike(postId){
  if(!state.currentUser){setState({modal:true});return;}
  const uid=state.currentUser.id;
  const posts=state.posts.map(p=>{
    if(p.id!==postId)return p;
    const liked=p.likedBy.includes(uid);
    return {...p,likes:p.likes+(liked?-1:1),likedBy:liked?p.likedBy.filter(x=>x!==uid):[...p.likedBy,uid]};
  });
  setState({posts});
}
function handleComment(postId){
  const text=(state.commentInputs[postId]||'').trim();
  if(!text)return;
  if(!state.currentUser){setState({modal:true});return;}
  const u=state.currentUser;
  const newC={id:'c'+Date.now(),authorId:u.id,authorName:u.displayName,authorAvatar:u.avatar,text};
  const posts=state.posts.map(p=>{
    if(p.id!==postId)return p;
    return {...p,comments:[...p.comments,newC]};
  });
  const ci={...state.commentInputs,[postId]:''};
  setState({posts,commentInputs:ci});
}
function toggleComments(postId){
  const ec={...state.expandedComments,[postId]:!state.expandedComments[postId]};
  setState({expandedComments:ec});
}

function renderAvatar(user,cls){
  const [bg,fg]=getAvatarColor(user?user.id:'?');
  const letter=(user?(user.displayName||user.id):'?')[0].toUpperCase();
  const el=document.createElement('div');
  el.className='avatar-circle '+(cls||'');
  el.style.background=bg;el.style.color=fg;el.textContent=letter;
  if(user&&user.avatar){
    const img=document.createElement('img');
    img.src=user.avatar;img.className='avatar-circle '+(cls||'');
    img.style.objectFit='cover';
    return img;
  }
  return el;
}

function buildPostCard(post,isMine=false){
  const u=findUser(post.authorId)||{id:post.authorId,displayName:post.authorName,avatar:post.authorAvatar};
  const liked=state.currentUser&&post.likedBy.includes(state.currentUser.id);
  const expanded=state.expandedComments[post.id];

  const card=document.createElement('div');
  card.className='post-card page';

  const header=document.createElement('div');header.className='post-header';
  const av=renderAvatar(u,'');
  av.style.cursor='pointer';
  av.onclick=()=>setState({view:'userProfile',profileUserId:post.authorId});
  header.appendChild(av);
  const info=document.createElement('div');info.className='post-author-info';
  const idDiv=document.createElement('div');idDiv.className='post-author-id';idDiv.style.cursor='pointer';idDiv.textContent=`@${post.authorId}`;
  idDiv.onclick=()=>setState({view:'userProfile',profileUserId:post.authorId});
  const timeDiv=document.createElement('div');timeDiv.className='post-time';timeDiv.textContent=formatTime(post.time);
  info.appendChild(idDiv);info.appendChild(timeDiv);
  header.appendChild(info);
  if(isMine){const t=document.createElement('span');t.className='tag';t.textContent='我的';header.appendChild(t);}
  card.appendChild(header);

  const title=document.createElement('div');title.className='post-title';title.textContent=post.title;card.appendChild(title);
  const content=document.createElement('div');content.className='post-content';content.textContent=post.content;card.appendChild(content);
  if(post.image){const img=document.createElement('img');img.className='post-image';img.src=post.image;card.appendChild(img);}

  const actions=document.createElement('div');actions.className='post-actions';
  const commentBtn=document.createElement('button');commentBtn.className='action-btn';
  commentBtn.innerHTML=`<i class="ti ti-message-circle" aria-hidden="true"></i> ${post.comments.length}`;
  commentBtn.onclick=()=>toggleComments(post.id);
  const likeBtn=document.createElement('button');likeBtn.className='action-btn'+(liked?' liked':'');
  likeBtn.innerHTML=`<i class="ti ti-heart${liked?'-filled':''}" aria-hidden="true"></i> ${post.likes}`;
  likeBtn.onclick=()=>handleLike(post.id);
  actions.appendChild(commentBtn);actions.appendChild(likeBtn);

  if(state.currentUser && post.authorId === state.currentUser.id){
    const editBtn=document.createElement('button');editBtn.className='action-btn';
    editBtn.style.marginLeft='auto';
    editBtn.innerHTML=`<i class="ti ti-edit" aria-hidden="true"></i> 編輯`;
    editBtn.onclick=()=>{
      newPostForm = {title:post.title, content:post.content, image:post.image, imgSrc:post.image};
      setState({editingPostId:post.id, view:'newPost'});
    };
    actions.appendChild(editBtn);

    const delBtn=document.createElement('button');delBtn.className='action-btn';
    delBtn.innerHTML=`<i class="ti ti-trash" aria-hidden="true"></i> 刪除`;
    delBtn.onclick=()=>{

        setState({posts:state.posts.filter(p=>p.id!==post.id)});
        showToast('貼文已刪除');

    };

  }

  card.appendChild(actions);

  if(expanded){
    const cs=document.createElement('div');cs.className='comment-section';
    post.comments.forEach(c=>{
      const cu=findUser(c.authorId)||{id:c.authorId,displayName:c.authorName,avatar:c.authorAvatar};

    });
    if(state.currentUser){
      const row=document.createElement('div');row.className='comment-input-row';
      row.appendChild(renderAvatar(state.currentUser,'avatar-sm'));
      const inp=document.createElement('input');inp.type='text';inp.placeholder='說點什麼吧...';
      inp.value=state.commentInputs[post.id]||'';
      inp.oninput=e=>{state.commentInputs={...state.commentInputs,[post.id]:e.target.value};};
      inp.onkeydown=e=>{if(e.key==='Enter')handleComment(post.id);};
      const sb=document.createElement('button');sb.className='send-btn';sb.textContent='送出';
      sb.onclick=()=>handleComment(post.id);
      row.appendChild(inp);row.appendChild(sb);cs.appendChild(row);
    } else {
      const hint=document.createElement('div');hint.className='login-hint';hint.textContent='👋 請先登入才能留言';
      hint.onclick=()=>setState({view:'login'});cs.appendChild(hint);
    }
    card.appendChild(cs);
  }
  return card;
}

function buildCaptchaModal(){
  const ov=document.createElement('div');ov.className='modal-overlay';
  const box=document.createElement('div');box.className='modal-box captcha-box';
  
  const title=document.createElement('div');title.className='modal-title';title.textContent='請選取所有包含朴寶英的圖片';
  box.appendChild(title);
  
  const grid=document.createElement('div');grid.className='captcha-grid';
  CAPTCHA_IMAGES.forEach((img, idx) => {
    const item=document.createElement('div');
    item.className='captcha-item'+(state.captchaSelection.includes(idx)?' selected':'');
    item.style.backgroundImage=`url(${img.url})`;
    item.onclick=()=>{
      let sel=[...state.captchaSelection];
      if(sel.includes(idx)) sel=sel.filter(i=>i!==idx);
      else sel.push(idx);
      state.captchaSelection = sel;
      if (sel.includes(idx)) {
        item.classList.add('selected');
        item.innerHTML='<div class="captcha-check"><i class="ti ti-check" aria-hidden="true"></i></div>';
      } else {
        item.classList.remove('selected');
        item.innerHTML='';
      }
    };
    if(state.captchaSelection.includes(idx)){
      item.innerHTML='<div class="captcha-check"><i class="ti ti-check" aria-hidden="true"></i></div>';
    }
    grid.appendChild(item);
  });
  box.appendChild(grid);
  
  const err=document.createElement('div');
  err.id='captcha-err';err.className='err-msg';err.style.display='none';err.textContent='驗證失敗，請確認您選了正確的圖片！';
  box.appendChild(err);

  const btns=document.createElement('div');btns.className='modal-btns';
  btns.style.marginTop='20px';
  const verify=document.createElement('button');verify.className='modal-btn modal-btn-primary';verify.textContent='驗證';
  verify.onclick=()=>{
    const correctIndices=CAPTCHA_IMAGES.map((img, i)=>img.isTarget?i:-1).filter(i=>i!==-1);
    const sel=state.captchaSelection;
    const isCorrect = correctIndices.length===sel.length && correctIndices.every(i=>sel.includes(i));
    if(isCorrect){
      setState({currentUser:state.pendingUser,pendingUser:null,captchaOpen:false,captchaSelection:[],view:'home'});
      showToast('登入成功！🐾');
    }else{
      document.getElementById('captcha-err').style.display='block';
      setTimeout(()=>setState({captchaSelection:[]}),1500);
    }
  };
  const cancel=document.createElement('button');cancel.className='modal-btn modal-btn-ghost';cancel.textContent='取消';
  cancel.onclick=()=>setState({captchaOpen:false,pendingUser:null,captchaSelection:[]});
  
  btns.appendChild(cancel);btns.appendChild(verify);
  box.appendChild(btns);
  
  const disclaimer=document.createElement('div');
  disclaimer.style.marginTop='20px';
  disclaimer.style.fontSize='12px';
  disclaimer.style.color='var(--text-light)';
  disclaimer.textContent='資料、圖片引用來自網路公開下載，僅作為本課程使用，不為營利用途';
  box.appendChild(disclaimer);

  ov.appendChild(box);
  return ov;
}

function buildUserProfilePage(){
  const wrap=document.createElement('div');wrap.className='container page';
  const uId=state.profileUserId;
  const u=findUser(uId)||{id:uId,displayName:uId,avatar:null};
  
  const hero=document.createElement('div');hero.className='home-hero';
  hero.innerHTML=`<div style="display:flex;justify-content:center;margin-bottom:12px">${renderAvatar(u,'avatar-lg').outerHTML}</div>
    <div class="home-title">${u.displayName} 的主頁</div><div class="home-sub" style="margin-bottom:8px">@${u.id}</div>
    ${u.bio ? `<div class="post-content" style="max-width:400px;margin:0 auto;color:var(--text-mid);font-size:14px;background:var(--white);padding:10px;border-radius:12px;border:1px solid var(--border)">${u.bio}</div>` : ''}`;
  wrap.appendChild(hero);
  
  const userPosts=state.posts.filter(p=>p.authorId===uId).sort((a,b)=>b.time-a.time);
  const st=document.createElement('div');st.className='section-title';st.innerHTML=`<i class="ti ti-notebook" aria-hidden="true"></i> ${u.displayName} 的發布紀錄`;
  wrap.appendChild(st);
  
  if(userPosts.length===0){
    const emp=document.createElement('div');emp.className='empty-posts';emp.textContent='這位用戶還沒有發布任何貼文。';wrap.appendChild(emp);
  } else {
    userPosts.forEach(p=>wrap.appendChild(buildPostCard(p, state.currentUser && state.currentUser.id===p.authorId)));
  }
  
  const backBtn=document.createElement('button');backBtn.className='btn btn-secondary';
  backBtn.style.marginTop='20px';backBtn.innerHTML='<i class="ti ti-arrow-left"></i> 返回上一頁';
  backBtn.onclick=()=>setState({view:'feed'});
  wrap.appendChild(backBtn);
  
  return wrap;
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(buildNav());
  if(state.view==='login')app.appendChild(buildLoginPage());
  else if(state.view==='register')app.appendChild(buildRegPage());
  else if(state.view==='home'&&state.currentUser)app.appendChild(buildHomePage());
  else if(state.view==='newPost'&&state.currentUser)app.appendChild(buildNewPostPage());
  else if(state.view==='editProfile'&&state.currentUser)app.appendChild(buildEditProfilePage());
  else if(state.view==='userProfile')app.appendChild(buildUserProfilePage());
  else app.appendChild(buildFeedPage());
  if(state.modal)app.appendChild(buildModal());
  if(state.captchaOpen)app.appendChild(buildCaptchaModal());
  if(state.toast){
    const t=document.createElement('div');t.className='toast';t.textContent=state.toast;app.appendChild(t);
  }
}
render();
</script>
